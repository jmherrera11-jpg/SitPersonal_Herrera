    <section class="formulario">
        <form method="GET" action="../../index.html"></form>
        <fieldset>

            <label for="Asignatura"></label>Asignatura</label>
            <input type="text" placeholder="Escribe tu Asiganura" id="asignatura" name="Asignatura">

            <br>
            <label for="NRC"></label>NRC</label>

            <br>
            <br>
            <label for="Dia"></label>Seleciona la fehca y hora de Matricula</label>
            <input type="datetime-local" id="Dia" name="Dia">
            <br>
            <br>


            <label for="signatura"> Asignatura: </label>

            <select>
                <option value="Matematicas">Matematicas</option>
                <option value="Programacion">Programacion</option>
                <option value="Tecnologia">Tecnologia</option>
            </select> </br></br>

            <label for="hora">Hora:</label>
            <input type="time" id="hora" name="hora" min="08:00" max="17:00" step="1800"> </br></br>

            <fieldset />
