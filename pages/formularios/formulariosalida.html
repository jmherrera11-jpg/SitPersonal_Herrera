    <section class="Titulo">
        <h2 style="color: #2754a7">Intereses Personales</h2>
        <img src="../../imgs/Perfil.png" alt="ESPE">
        <br> <br>
    </section>


    <section class="intereses">
        <form method="GET" action="../../index.html">
            <fieldset style="color: #405b8d;">
                <legend>
                    <h3> Deportes </h3>
                </legend>
                <label for="Futbol">Futbol</label>
                <input type="checkbox" value="Futbol" id="Futbol" name="Futbol"> </br></br>
                <label for="Basketball">Basketball</label>
                <input type="checkbox" value="Basketball" id="Basketball" name="Basketball"></br></br>
                <label for="Tenis">Tenis</label>
                <input type="checkbox" value="Tenis" id="Tenis" name="Tenis">
            </fieldset>

            <fieldset style="color: #405b8d;">
                <legend>
                    <h3> Redes Sociales </h3>
                </legend>

                <select name="Redes" id="Redes">
                    <option value="Instagram">Instagram</option>
                    <option value="Facebook">Facebook</option>
                    <option value="Tenis">X</option>
                </select>

                </br></br>
            </fieldset>

            <fieldset style="color: #405b8d;">
                <legend>
                    <h3>Juegos</h3>
                </legend>
                <label for="Clash"></label>Clash Royale</label>
                <input type="checkbox" value="Clash" id="Clash" name="Clash"></br></br>
                <label for="COD"></label>COD</label>
                <input type="checkbox" value="COD" id="COD" name="COD"></br></br>
                <label for="MineCraft"></label>MineCraft</label>
                <input type="checkbox" value="MineCraft" id="MineCraft" name="MineCraft"></br></br>
                <label for="Valorant"></label>Valorant</label>
                <input type="checkbox" value="Valorant" id="Valorant" name="Valorant"></br></br>
            </fieldset>

            <fieldset style="color: #405b8d;">
                <legend>
                    <h3>Frecuencia de Juego</h3>
                </legend>
                <label for="minutos"></label>30 minutos</label>
                <input type="radio" value="30Mins" id="minutos" name="minutos"></br></br>
                <label for="hora"></label>1 hora</label>
                <input type="radio" value="1Hora" id="hora" name="hora"></br></br>
                <label for="horas"></label>2 horas o más</label>
                <input type="radio" value="2Horas" id="horas" name="horas"></br></br>
            </fieldset>
            <br>
            <button type="submit" style="color: #feffff; background-color: #2754a7;"> Enviar </button>
        </form>
    </section><br>
